<style>
:root{--paper:#F1EDE4;--paper2:#E7E1D5;--ink:#14120F;--soft:#6B655A;--stamp:#C4332B;--line:#CFC7B6}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);background-image:repeating-linear-gradient(0deg,transparent 0 27px,rgba(20,18,15,.03) 27px 28px);color:var(--ink);font-family:'Inter Tight',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
.wrap{max-width:1400px;margin:0 auto;padding:0 16px}
header{position:sticky;top:0;z-index:60;background:var(--paper);border-bottom:2px solid var(--ink)}
.bar{display:flex;align-items:center;gap:12px;padding:11px 0}
.logo{font-family:'Anton',sans-serif;font-size:24px;text-transform:uppercase;line-height:1;white-space:nowrap}
.logo span{color:var(--stamp)}
.search{flex:1;display:flex;align-items:center;gap:8px;border:1px solid var(--ink);padding:8px 10px}
.search input{flex:1;border:0;background:transparent;outline:none;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--ink);min-width:0}
.search svg{flex:0 0 14px;opacity:.5}
.nav{display:flex;gap:4px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav a{flex:0 0 auto;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:6px 10px;border:1px solid var(--line);background:var(--paper2);white-space:nowrap}
.nav a.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.hero{padding:34px 0 24px;border-bottom:2px solid var(--ink)}
.hero h1{font-family:'Anton',sans-serif;font-size:clamp(38px,8.4vw,96px);line-height:.9;text-transform:uppercase;letter-spacing:-.02em}
.hero h1 em{font-style:normal;color:var(--stamp)}
.hero p{max-width:620px;margin-top:12px;font-size:16px;line-height:1.5;color:var(--soft)}
.stats{display:flex;gap:24px;flex-wrap:wrap;margin-top:18px;font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--soft)}
.stats b{display:block;font-family:'Anton',sans-serif;font-size:28px;letter-spacing:0;color:var(--ink)}
.sec{padding:30px 0}
.sec-h{display:flex;align-items:baseline;gap:12px;border-bottom:2px solid var(--ink);padding-bottom:8px;margin-bottom:16px}
.sec-h h2{font-family:'Anton',sans-serif;font-size:clamp(23px,3.6vw,38px);text-transform:uppercase;line-height:1}
.sec-h span{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--soft);letter-spacing:.12em}
.tiles{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(165px,1fr))}
.tile{border:1px solid var(--line);background:var(--paper2);display:flex;flex-direction:column;transition:transform .12s,box-shadow .12s,border-color .12s}
.tile:hover{transform:translate(-2px,-2px);box-shadow:4px 4px 0 var(--ink);border-color:var(--ink)}
.tile .ph{aspect-ratio:4/3;overflow:hidden;background:var(--paper);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:center}
.tile img{width:100%;height:100%;object-fit:cover}
.tile .tx{padding:9px 10px;display:flex;align-items:baseline;gap:8px}
.tile .tx b{font-family:'Anton',sans-serif;font-size:16px;text-transform:uppercase;font-weight:400}
.tile .tx i{margin-left:auto;font-style:normal;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--soft)}
.tools{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.filters{display:flex;gap:5px;overflow-x:auto;padding-bottom:6px;flex:1;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.f{flex:0 0 auto;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:6px 9px;border:1px solid var(--line);background:var(--paper2);white-space:nowrap}
.f.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
select{font-family:'JetBrains Mono',monospace;font-size:12px;border:1px solid var(--ink);background:transparent;padding:7px 9px;border-radius:0}
.grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
.card{border:1px solid var(--line);background:var(--paper2);display:flex;flex-direction:column;transition:transform .12s,box-shadow .12s,border-color .12s}
.card:hover{transform:translate(-2px,-2px);box-shadow:4px 4px 0 var(--ink);border-color:var(--ink)}
.thumb{aspect-ratio:1/1;background:var(--paper);border-bottom:1px solid var(--line);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb .gh{font-family:'Anton',sans-serif;font-size:17px;text-transform:uppercase;color:var(--line);text-align:center;padding:0 8px}
.tag{position:absolute;top:0;left:0;background:var(--ink);color:var(--paper);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;padding:3px 6px;text-transform:uppercase}
.body{padding:10px 11px 11px;display:flex;flex-direction:column;gap:6px;flex:1}
.name{font-size:13px;font-weight:500;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.price{font-family:'Anton',sans-serif;font-size:20px;color:var(--stamp);margin-top:auto}
.acts{display:flex;gap:5px}
.buy{flex:1;text-align:center;background:var(--ink);color:var(--paper);font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:9px 4px}
.buy:hover{background:var(--stamp)}
.pics{border:1px solid var(--ink);padding:9px 7px;font-family:'JetBrains Mono',monospace;font-size:10px}
.pics:hover{background:var(--ink);color:var(--paper)}
.guide{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.step{border:1px solid var(--line);background:var(--paper2);padding:15px}
.step b{display:block;font-family:'Anton',sans-serif;font-size:32px;color:var(--stamp);line-height:1}
.step h3{font-size:15px;margin:5px 0}
.step p{font-size:13.5px;line-height:1.5;color:var(--soft)}
.sellers{display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
.seller{border:1px dashed var(--ink);padding:12px;font-size:13.5px;line-height:1.45}
.seller a{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--stamp);letter-spacing:.08em;text-transform:uppercase;display:inline-block;margin-top:6px;border-bottom:1px solid var(--stamp)}
.cta{display:flex;gap:14px;align-items:center;flex-wrap:wrap;border:2px solid var(--ink);background:var(--ink);color:var(--paper);padding:16px 18px;margin:18px 0}.cta b{font-family:'Anton',sans-serif;font-size:22px;text-transform:uppercase;font-weight:400;line-height:1.1}.cta p{font-size:13.5px;color:#CFC7B6;margin-top:2px;line-height:1.4}.cta a{margin-left:auto;background:var(--stamp);color:#fff;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:12px 18px;white-space:nowrap}.cta a:hover{background:var(--paper);color:var(--ink)}@media(max-width:600px){.cta a{margin-left:0;width:100%;text-align:center}}
footer{border-top:2px solid var(--ink);padding:18px 0;margin-top:26px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--soft);text-align:center}
#sent{height:50px}
.empty{border:1px dashed var(--ink);padding:22px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--soft)}
.top{position:fixed;right:14px;bottom:14px;z-index:70;background:var(--ink);color:var(--paper);width:42px;height:42px;display:none;align-items:center;justify-content:center;font-size:16px}
.top.show{display:flex}
@media(max-width:600px){.grid,.tiles{grid-template-columns:repeat(auto-fill,minmax(46%,1fr));gap:9px}.logo{font-size:19px}}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

<header>
  <div class="wrap">

<script>
const SHEET='1HbVY700zq3phSeUj68GUn59XM6iLTZBCU67_8OM8MNo', GID='795941508';
const CSV=`https://docs.google.com/spreadsheets/d/${SHEET}/gviz/tq?tqx=out:csv&gid=${GID}&_=${Math.floor(Date.now()/600000)}`;
const app=document.getElementById('app'), nav=document.getElementById('nav'), qEl=document.getElementById('q');

const BRANDS=[[/corteiz|crtz|alcatraz/i,'Corteiz'],[/trapstar/i,'Trapstar'],[/sp5der|spider/i,'Sp5der'],[/hellstar/i,'Hellstar'],
[/broken planet/i,'Broken Planet'],[/syna|synaworld/i,'Syna World'],[/carsicko/i,'Carsicko'],[/minus two/i,'Minus Two'],
[/mertra|\bmert\b/i,'Mertra'],[/denim tears/i,'Denim Tears'],[/acne/i,'Acne Studios'],[/gallery ?dept|gallery/i,'Gallery Dept'],
[/ralph|polo rl/i,'Ralph Lauren'],[/supreme/i,'Supreme'],[/nike|nocta/i,'Nike'],[/north face|tnf/i,'The North Face'],
[/derschutze/i,'Derschutze'],[/peolhouse/i,'Peolhouse'],[/eeysian/i,'Eeysian'],[/mutimao|\bmuti\b/i,'Mutimao'],
[/\buvu\b/i,'UVU'],[/\b6pm\b/i,'6PM'],[/stussy/i,'Stussy'],[/essentials|fear of god/i,'Fear of God'],[/protect/i,'Protect'],
[/lacoste/i,'Lacoste'],[/moncler/i,'Moncler'],[/stone island/i,'Stone Island'],[/amiri/i,'Amiri'],[/bape/i,'Bape'],
[/palm angels/i,'Palm Angels'],[/rhude/i,'Rhude'],[/represent/i,'Represent'],[/chrome hearts/i,'Chrome Hearts'],
[/balenciaga/i,'Balenciaga'],[/off.?white/i,'Off-White'],[/adidas/i,'Adidas'],[/jordan/i,'Jordan'],[/\breav\b/i,'Reav'],
[/cargos? graff|graff/i,'Cargos Graff'],[/enfants riches/i,'Enfants Riches Déprimés'],[/new balance/i,'New Balance'],[/casablanca/i,'Casablanca'],[/mixed emotion/i,'Mixed Emotion'],[/glo gang/i,'Glo Gang'],[/vetements/i,'Vetements'],[/drew house/i,'Drew House'],[/revenge/i,'Revenge'],[/kapital/i,'Kapital'],[/arnodefrance/i,'Arnodefrance'],[/cibision/i,'Cibision'],[/billionaire/i,'Billionaire Boys Club'],[/lemaire/i,'Lemaire'],[/arc.?teryx/i,"Arc'teryx"],[/air jordan/i,'Air Jordan'],[/ultraboost|adizero|superstar|forum low|gazelle|samba|adimatic|campus/i,'Adidas'],[/vapormax|air max|dunk|air force|nocta|shox|blazer/i,'Nike'],[/asics|kayano|gel-/i,'Asics'],[/ugg/i,'UGG'],[/birkenstock/i,'Birkenstock'],[/dr martens/i,'Dr Martens'],[/air force/i,'Nike Air Force 1'],[/air max/i,'Nike Air Max'],[/\bdunk\b/i,'Nike Dunk'],[/birkenstock/i,'Birkenstock'],[/\bugg\b/i,'UGG'],[/\bcne\b/i,'CNE'],[/anti social/i,'Anti Social Social Club'],[/mastermind/i,'Mastermind'],[/jil sander/i,'Jil Sander'],[/aboutblank/i,'Aboutblank'],[/032c/i,'032c'],[/comme des/i,'Comme des Garçons'],[/asics|gel-kayano|kayano/i,'Asics'],[/dr martens|dr\.? martin/i,'Dr Martens'],[/margiela|\bgat\b/i,'Maison Margiela'],[/mihara/i,'Mihara Yasuhiro'],[/rick owens/i,'Rick Owens'],[/yeezy/i,'Yeezy'],[/godspeed/i,'Godspeed'],[/lae\b/i,'Nike']];

/* categoría -> familia */
const CATS=[
 [/bolso|handbag|\bbag\b|wallet|cartera|backpack|mochila|pouch|clutch/i,'Bolsos','Bolsos y accesorios'],
 [/gorra|\bcap\b|\bhat\b|beanie|bucket|keychain|llavero|belt|cintur|scarf|bufanda|sock|calcetin|glasses|gafas|jewel|collar|necklace|ring\b/i,'Accesorios','Bolsos y accesorios'],
 [/hoodie|capucha/i,'Hoodies','Ropa'],
 [/tracksuit|chandal|conjunto|\bset\b|zip-up coat/i,'Conjuntos','Ropa'],
 [/sweatshirt|sweater|knit|crewneck|cerwneck|jersey|sudadera|cardigan/i,'Sudaderas','Ropa'],
 [/jacket|chaqueta|coat|puffer|abrigo|windbreaker|bomber|vest|chaleco/i,'Chaquetas','Ropa'],
 [/jean|vaquero|denim (pant|trouser)/i,'Jeans','Ropa'],
 [/short|bermuda/i,'Shorts','Ropa'],
 [/pant|pantal|sweatpant|jogger|cargo|trouser/i,'Pantalones','Ropa'],
 [/polo/i,'Polos','Ropa'],
 [/longsleeve|long sleeve|manga larga|camisa|\bshirt\b/i,'Camisas','Ropa'],
 [/tee\b|t-?shirt|camiseta|manga corta|short sleeve/i,'Camisetas','Ropa'],
 [/zapatilla|sneaker|\bshoes?\b|trainer|\bdunk\b|air ?force|air ?max|new balance|\basics\b|kayano|dr martens|bapesta|\bshox\b|ramones|jumbo lace|\bgats?\b|\bmmy\b|mihara|skel top|2002r|9060|1906|\b992\b|air jordan|jordan [0-9]|yeezy (350|slide|foam|boost)|birkenstock|\bcurb\b|salomon|xt-6|golden goose|mcqueen|hot step|\bcampus\b|stan smith|nocta/i,'Zapatillas','Calzado']
];

const slug=s=>s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
const money=s=>{const n=parseFloat(String(s).replace(/[^\d,.-]/g,'').replace(',','.'));return (isNaN(n)||n<1)?null:n;};
const fmt=n=>n==null?'Consultar':n.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
const esc=s=>String(s).replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
const okCss=u=>/^https:\/\/(www\.)?cssbuy\.com\/item-micro-\d+\.html/i.test(u);
const okYu=u=>/^https:\/\/[a-z0-9.-]+\.yupoo\.com\//i.test(u);
const cover=u=>'/cover?u='+encodeURIComponent(u);
const pic=i=>i.a?cover(i.a):('/wimg?id='+((i.l.match(/item-micro-(\d+)/)||[])[1]||''));

function clean(n){
  return n.replace(/[\u4e00-\u9fff]+/g,' ')           // chino
          .replace(/[¥￥]\s?\d+(\.\d+)?\s?(cny)?/gi,' ')// precios chinos
          .replace(/^#+\s*/,'').replace(/\s{2,}/g,' ').replace(/\s*[-·|]\s*$/,'').trim();
}

function parseCSV(t){const R=[];let r=[],c='',q=false;
  for(let i=0;i<t.length;i++){const ch=t[i];
    if(q){ if(ch==='"'){ if(t[i+1]==='"'){c+='"';i++;} else q=false; } else c+=ch; }
    else if(ch==='"')q=true; else if(ch===','){r.push(c);c='';}
    else if(ch==='\n'){r.push(c);R.push(r);r=[];c='';} else if(ch!=='\r')c+=ch;}
  r.push(c);R.push(r);return R;}

let ALL=[],SELLERS=[],BR=[],CT=[],FAM=[];

function classify(name,album,sec){
  let n=name, brand=null, cat=null, fam=null;

  if(/mrcanvas/i.test(album)){                       // álbum mixto de bolsos: no afirmamos marca
    brand='Bolsos & carteras'; cat='Bolsos'; fam='Bolsos y accesorios';
    n=n.replace(/^goyard\s*/i,'Bolso ');
    return {n,brand,cat,fam};
  }
  if(/huskyreps/i.test(album) && /(zip-?up coat|pants|[A-Z]{2}\d{4}-\d{3})/i.test(n)){  // Husky = Nike Tech
    brand='Nike'; cat='Conjuntos'; fam='Ropa';
    const code=(n.match(/[A-Z]{2}\d{4}-\d{3}/)||[])[0];
    n='Nike Tech chándal' + (code?' '+code:'');
    return {n,brand,cat,fam};
  }
  const b=BRANDS.find(([re])=>re.test(n)) || BRANDS.find(([re])=>re.test(sec));
  const c=CATS.find(([re])=>re.test(n));
  return {n, brand:b?b[1]:'Otros', cat:c?c[1]:'Otros', fam:c?c[2]:'Ropa'};
}

function build(rows){
  let sec='',items=[],sellers=[],inS=false;
  rows.forEach((r,idx)=>{
    const raw=(r[0]||'').trim(), pr=(r[1]||'').trim(), l=(r[2]||'').trim(), al=(r[3]||'').trim();
    if(idx===0) return;
    if(!raw && !l) return;
    if(!l){                                   // separador o vendedor
      if(/vendedores recomendados/i.test(raw)){inS=true;return;}
      if(inS){ sellers.push({t:raw,url:okYu(al)?al:''}); return; }
      sec=raw.replace(/\(.*?\)/g,'').replace(/[—–-]+/g,' ').trim();
      return;
    }
    if(!okCss(l)) return;                     // solo Weidian vivo (item-micro)
    const {n,brand,cat,fam}=classify(clean(raw),al,sec);
    if(!n) return;
    items.push({n,p:money(pr),l,a:okYu(al)?al:'',b:brand,c:cat,f:fam});
  });
  const vistos=new Set(); const limpio=[];
  for(const it of items){ const id=(it.l.match(/item-micro-(\d+)/)||[])[1];
    if(id && vistos.has(id)) continue; if(id) vistos.add(id);
    if(it.n.trim().length<6) it.n=it.b+(it.c!=='Otros'?' · '+it.c:'');
    limpio.push(it); }
  return {items:limpio,sellers};
}

function cardHTML(i){
  const img=`<img loading="lazy" data-src="${esc(pic(i))}" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'gh',textContent:'${esc(i.b)}'}))">`;
  return `<article class="card"><div class="thumb">${img}<span class="tag">${esc(i.b)}</span></div>
    <div class="body"><div class="name">${esc(i.n)}</div><div class="price">${fmt(i.p)}</div>
    <div class="acts"><a class="buy" href="${esc(i.l)}" target="_blank" rel="nofollow noopener">Comprar</a>
    ${i.a?`<a class="pics" href="${esc(i.a)}" target="_blank" rel="noopener">Fotos</a>`:''}</div></div></article>`;
}

let LIST=[],drawn=0,BASE=[],CATSEL='TODO';const PAGE=48;
const cola=[]; let vuelo=0;
function siguiente(){ while(vuelo<4 && cola.length){ const im=cola.shift(); if(!im.isConnected) continue; vuelo++;
  const fin=()=>{ vuelo--; siguiente(); };
  im.addEventListener('load',fin,{once:true}); im.addEventListener('error',fin,{once:true});
  im.src=im.dataset.src; } }
const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){ io.unobserve(e.target); cola.push(e.target); siguiente(); }}),{rootMargin:'300px'});
const lazy=()=>document.querySelectorAll('img[data-src]:not([src])').forEach(i=>io.observe(i));
const sentIO=new IntersectionObserver(e=>{if(e[0].isIntersecting)drawMore();},{rootMargin:'700px'});

function drawMore(){const g=document.getElementById('grid');if(!g)return;
  const s=LIST.slice(drawn,drawn+PAGE);g.insertAdjacentHTML('beforeend',s.map(cardHTML).join(''));drawn+=s.length;lazy();}

function apply(){
  const s=document.getElementById('sort')?.value||'none';
  LIST=CATSEL==='TODO'?BASE.slice():BASE.filter(i=>i.c===CATSEL);
  if(s==='asc')LIST.sort((a,b)=>(a.p??1e9)-(b.p??1e9));
  if(s==='desc')LIST.sort((a,b)=>(b.p??-1)-(a.p??-1));
  drawn=0;const g=document.getElementById('grid');g.innerHTML='';
  document.getElementById('cnt').textContent=LIST.length.toLocaleString('es-ES')+' piezas';
  drawMore();
}

function listView(title,items){
  BASE=items;CATSEL='TODO';
  const cats=[...new Set(items.map(i=>i.c))].filter(c=>c!=='Otros');
  app.innerHTML=`<section class="sec">
    <div class="sec-h"><h2>${esc(title)}</h2><span id="cnt">${items.length.toLocaleString('es-ES')} piezas</span></div>
    <div class="tools">
      <div class="filters" id="filters">
        <button class="f on" data-c="TODO">Todo</button>
        ${cats.map(c=>`<button class="f" data-c="${esc(c)}">${esc(c)}</button>`).join('')}
      </div>
      <select id="sort"><option value="none">Orden: catálogo</option><option value="asc">Precio ↑</option><option value="desc">Precio ↓</option></select>
    </div>
    <div class="grid" id="grid"></div>
    ${items.length?'<div id="sent"></div>':'<div class="empty">Nada por aquí.</div>'}</section>`;
  document.getElementById('filters').onclick=e=>{const b=e.target.closest('.f');if(!b)return;
    document.querySelectorAll('.f').forEach(x=>x.classList.remove('on'));b.classList.add('on');CATSEL=b.dataset.c;apply();};
  document.getElementById('sort').onchange=apply;
  apply();
  const s=document.getElementById('sent');if(s)sentIO.observe(s);
}

const rep=arr=>{const c=arr.find(x=>x.a); return c?c.a:'';};
const tile=(href,label,n,img)=>`<a class="tile" href="${href}">
  <div class="ph">${img?`<img loading="lazy" data-src="${esc(cover(img))}" alt="" onerror="this.remove()">`:''}</div>
  <div class="tx"><b>${esc(label)}</b><i>${n}</i></div></a>`;

function home(){
  app.innerHTML=`
  <section class="hero">
    <h1>LA HOJA<br><em>DE CONFIANZA</em>.</h1>
    <p>Miles de piezas ordenadas por marca y por tipo. Cada una con las fotos reales del vendedor y su link directo, lista para comprar.</p>
    <div class="stats">
      <div><b>${ALL.length.toLocaleString('es-ES')}</b>piezas</div>
      <div><b>${BR.length}</b>marcas</div>
      <div><b>${CT.length}</b>categorías</div>
      <div><b>Weidian</b>links vivos</div>
    </div>
  </section>
  <div class="cta"><div><b>Primera compra en CSSBuy</b><p>Crea la cuenta desde aquí y entras con cupón de bienvenida. Es el agente que uso para todo el catálogo.</p></div><a href="https://cssb.uy/19Rl" target="_blank" rel="nofollow noopener">Crear cuenta</a></div>
  <section class="sec"><div class="sec-h"><h2>Explora</h2><span>por tipo</span></div>
    <div class="tiles">${FAM.map(([f,a])=>tile('#/f/'+slug(f),f,a.length,rep(a))).join('')}</div></section>
  <section class="sec"><div class="sec-h"><h2>Marcas</h2><span>toca para entrar</span></div>
    <div class="tiles">${BR.map(([b,a])=>tile('#/m/'+slug(b),b,a.length,rep(a))).join('')}</div></section>
  <section class="sec"><div class="sec-h"><h2>Categorías</h2><span>por prenda</span></div>
    <div class="tiles">${CT.map(([c,a])=>tile('#/c/'+slug(c),c,a.length,rep(a))).join('')}</div></section>
  ${guide()}
  ${SELLERS.length?`<section class="sec"><div class="sec-h"><h2>Vendedores recomendados</h2><span>compra directa en su Yupoo</span></div>
    <div class="sellers">${SELLERS.map(s=>`<div class="seller">${esc(s.t)}${s.url?`<br><a href="${esc(s.url)}" target="_blank" rel="noopener">Ver Yupoo →</a>`:''}</div>`).join('')}</div></section>`:''}`;
  lazy();
}

const guide=()=>`<section class="sec"><div class="sec-h"><h2>Cómo comprar</h2><span>4 pasos</span></div>
  <div class="guide">
    <div class="step"><b>01</b><h3>Mira las fotos</h3><p>El botón <strong>Fotos</strong> abre el álbum del vendedor: colores, detalles y tallas reales.</p></div>
    <div class="step"><b>02</b><h3>Abre el producto</h3><p><strong>Comprar</strong> lo abre ya cargado en CSSBuy. Eliges talla y color y lo añades al carrito.</p></div>
    <div class="step"><b>03</b><h3>Fotos QC</h3><p>Cuando llega al almacén te enseñan fotos reales del artículo antes de enviarlo.</p></div>
    <div class="step"><b>★</b><h3>Qué es un batch</h3><p>En zapatillas, el <strong>batch</strong> es la fábrica/versión. Los mejores del mercado: <strong>LJR</strong>, <strong>GC</strong>, <strong>PK</strong>, <strong>DT</strong> y <strong>H12</strong>. Las marcadas con <strong>★TOP</strong> son esas.</p></div><div class="step"><b>04</b><h3>Envío</h3><p>Junta varias piezas en un mismo envío para pagar menos porte hasta España.</p></div>
  </div></section>`;

function route(){
  const h=location.hash.replace(/^#\/?/,''),[k,v]=h.split('/');
  document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('on',a.getAttribute('href')==='#/'+h));
  scrollTo({top:0});
  if(!k)return home();
  if(k==='todo')return listView('Todo el catálogo',ALL);
  if(k==='guia'){app.innerHTML=guide();return;}
  if(k==='m'){const b=(BR.find(([n])=>slug(n)===v)||[])[0];if(b)return listView(b,ALL.filter(i=>i.b===b));}
  if(k==='c'){const c=(CT.find(([n])=>slug(n)===v)||[])[0];if(c)return listView(c,ALL.filter(i=>i.c===c));}
  if(k==='f'){const f=(FAM.find(([n])=>slug(n)===v)||[])[0];if(f)return listView(f,ALL.filter(i=>i.f===f));}
  home();
}
let t;qEl.oninput=()=>{clearTimeout(t);t=setTimeout(()=>{const q=qEl.value.trim().toLowerCase();
  if(!q)return route();
  listView('Buscar: '+q,ALL.filter(i=>(i.n+' '+i.b+' '+i.c).toLowerCase().includes(q)));},220);};
const topBtn=document.getElementById('top');
topBtn.onclick=()=>scrollTo({top:0,behavior:'smooth'});
addEventListener('scroll',()=>topBtn.classList.toggle('show',scrollY>800));
addEventListener('hashchange',()=>{qEl.value='';route();});

fetch(CSV+'&_='+Date.now(),{cache:'no-store'}).then(r=>r.text()).then(txt=>{
  const {items,sellers}=build(parseCSV(txt));
  ALL=items;SELLERS=sellers;
  const g=k=>{const m=new Map();ALL.forEach(i=>{const v=i[k];if(!m.has(v))m.set(v,[]);m.get(v).push(i);});
    return [...m.entries()].filter(([x])=>x!=='Otros').sort((a,b)=>b[1].length-a[1].length);};
  BR=g('b');CT=g('c');FAM=g('f');
  nav.innerHTML=`<a href="#/">Inicio</a><a href="#/todo">Todo (${ALL.length})</a>`
    +FAM.map(([f,a])=>`<a href="#/f/${slug(f)}">${esc(f)}</a>`).join('')
    +BR.slice(0,12).map(([b,a])=>`<a href="#/m/${slug(b)}">${esc(b)} ${a.length}</a>`).join('')
    +`<a href="#/guia">Cómo comprar</a>`;
  route();
}).catch(()=>{app.innerHTML='<div class="empty">No se pudo leer la hoja.</div>';});
</script>

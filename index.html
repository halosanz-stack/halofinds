  '<a class="slink'+(activo==='todo'?' on':'')+'" href="#/todo">Todo el catálogo <em>'+ITEMS.length+'</em></a>'+
  '<a class="slink'+(activo==='guia'?' on':'')+'" href="#/guia">Cómo comprar</a></div>';
 h+='<div class="sgroup"><h3>Familias</h3>'+FAM.map(f=>'<a class="slink'+(activo==='f:'+f[0]?' on':'')+'" href="#/f/'+slug(f[0])+'">'+esc(f[0])+' <em>'+f[1].length+'</em></a>').join('')+'</div>';
 h+='<div class="sgroup"><h3>Tipo de prenda</h3>'+CT.map(c=>'<a class="slink'+(activo==='c:'+c[0]?' on':'')+'" href="#/c/'+slug(c[0])+'">'+esc(c[0])+' <em>'+c[1].length+'</em></a>').join('')+'</div>';
 h+='<div class="sgroup"><h3>Marcas</h3><input class="bfilter" id="bfilter" placeholder="filtrar marca..."><div class="brandbox">'+
  BR.map(b=>'<a class="slink b-item'+(activo==='m:'+b[0]?' on':'')+'" data-b="'+esc(b[0].toLowerCase())+'" href="#/m/'+slug(b[0])+'">'+esc(b[0])+' <em>'+b[1].length+'</em></a>').join('')+'</div></div>';
 s.innerHTML=h;
 const f=document.getElementById('bfilter');
 if(f) f.oninput=()=>{const v=f.value.toLowerCase();document.querySelectorAll('.b-item').forEach(e=>{e.style.display=e.dataset.b.indexOf(v)>=0?'':'none';});};
 lazy();

</script><script>
let LISTA=[], MOSTRADOS=0, FILTRO='', ORDEN='';
const PASO=48;
const main=()=>document.getElementById('main');
function pintarLista(titulo, arr, chipsArr){
 LISTA=arr; MOSTRADOS=0; FILTRO=''; ORDEN='';
 let chips='';
 if(chipsArr && chipsArr.length>1){
  chips='<div class="chips" id="chips"><span class="chip on" data-v="">Todo</span>'+
   chipsArr.map(c=>'<span class="chip" data-v="'+esc(c[0])+'">'+esc(c[0])+' ('+c[1]+')</span>').join('')+'</div>';
 }
 const orden='<div class="chips" id="orden"><span class="chip" data-o="asc">Precio ↑</span><span class="chip" data-o="desc">Precio ↓</span></div>';
 main().innerHTML='<div class="sec-h"><h2>'+esc(titulo)+'</h2><span id="cnt">'+arr.length+' productos</span></div>'+chips+orden+'<div class="grid" id="grid"></div><button class="more" id="more">Ver más</button>';
 const ch=document.getElementById('chips');
 if(ch) ch.onclick=e=>{ const v=e.target.dataset.v; if(v===undefined) return;
   ch.querySelectorAll('.chip').forEach(c=>c.classList.remove('on')); e.target.classList.add('on');
   FILTRO=v; render(true); };
 const or=document.getElementById('orden');
 or.onclick=e=>{ const o=e.target.dataset.o; if(!o) return;
   or.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
   if(ORDEN===o){ORDEN='';}else{ORDEN=o;e.target.classList.add('on');}
   render(true); };
 document.getElementById('more').onclick=()=>render(false);
 render(true);
}
function filtrada(){
 let a=LISTA;
 if(FILTRO) a=a.filter(i=>i.c===FILTRO||i.b===FILTRO);
 if(ORDEN) a=a.slice().sort((x,y)=>{const px=x.p==null?1e9:x.p,py=y.p==null?1e9:y.p;return ORDEN==='asc'?px-py:py-px;});
 return a;
}
function render(reset){
 const g=document.getElementById('grid'); if(!g) return;
 const arr=filtrada();
 if(reset){ g.innerHTML=''; MOSTRADOS=0; const c=document.getElementById('cnt'); if(c)c.textContent=arr.length+' productos'; }
 const trozo=arr.slice(MOSTRADOS,MOSTRADOS+PASO);
 g.insertAdjacentHTML('beforeend', trozo.map(card).join(''));
 MOSTRADOS+=trozo.length;
 const b=document.getElementById('more');
 if(b) b.style.display = MOSTRADOS>=arr.length ? 'none':'block';
 lazy();
}
const guia='<div class="sec-h"><h2>Por qué este agente</h2><span>y no otro</span></div><div class="steps">'+'<div class="step"><b>¥→€</b><h3>Cambio real</h3><p>CSSBuy te cobra al cambio real del yuan del día. Otros agentes de moda meten un cambio inflado y se llevan la diferencia sin que la veas.</p></div>'+'<div class="step"><b>0%</b><h3>Sin sobreprecio</h3><p>El precio del producto es el que pone el vendedor chino. No hay recargo escondido encima del artículo.</p></div>'+'<div class="step"><b>QC</b><h3>Fotos gratis</h3><p>Te mandan fotos reales de lo que compraste antes de enviarlo. Si no te gusta, se devuelve.</p></div>'+'<div class="step"><b>📦</b><h3>Envío a España</h3><p>Junta varias piezas en un envío. Rutas que llegan a España sin líos y con seguimiento.</p></div>'+'</div>'+'<div class="sec-h"><h2>Cómo comprar</h2><span>4 pasos</span></div><div class="steps">'+
 '<div class="step"><b>01</b><h3>Crea la cuenta</h3><p>Regístrate en CSSBuy. Es el agente: compra por ti en China y te lo manda a casa.</p></div>'+
 '<div class="step"><b>02</b><h3>Pulsa Comprar</h3><p>Desde cualquier ficha se abre ya el producto correcto, con su talla y su precio.</p></div>'+
 '<div class="step"><b>03</b><h3>Almacén y QC</h3><p>Cuando llega al almacén te mandan fotos reales. Si algo no convence, se devuelve.</p></div>'+
 '<div class="step"><b>04</b><h3>Envío</h3><p>Junta varias piezas en un mismo envío para pagar menos. Suele tardar 10-20 días.</p></div>'+
 '</div>'+
 '<div class="sec-h"><h2>Qué es un batch</h2><span>solo zapatillas</span></div><div class="steps">'+
 '<div class="step"><b>★</b><h3>La fábrica importa</h3><p>El batch es la fábrica que hace la zapatilla. La misma zapa puede salir perfecta o ridícula según el batch.</p></div>'+
 '<div class="step"><b>1º</b><h3>Los buenos</h3><p><b>LJR</b>, <b>GC</b>, <b>PK</b>, <b>DT</b> y <b>H12</b> son los mejores del mercado ahora mismo.</p></div>'+
 '<div class="step"><b>2º</b><h3>Los baratos</h3><p>GX, BD o TS valen para el día a día, pero se notan de cerca. En una zapa cara, paga la diferencia.</p></div>'+
 '<div class="step"><b>✓</b><h3>Cómo lo ves aquí</h3><p>Cada zapatilla lleva su batch en el nombre. Las marcadas con <b>★ TOP</b> son del mejor batch.</p></div>'+
 '</div>';
function home(){
 sidebar('');
 const dest=ITEMS.filter(i=>i.top).slice(0,12);
 let h='<div class="hero"><h1>La hoja de <b>confianza</b></h1><p>Todo lo que encuentro, verificado uno a uno: link que funciona, foto real y precio en euros.</p>'+
  '<div class="stats"><div class="stat"><b>'+ITEMS.length.toLocaleString('es')+'</b><span>productos</span></div>'+
  '<div class="stat"><b>'+BR.length+'</b><span>marcas</span></div>'+
  '<div class="stat"><b>'+CT.length+'</b><span>categorías</span></div></div></div>';
 h+='<div class="cta"><div><b>Primera compra en CSSBuy</b><p>Crea la cuenta desde aquí y entras con cupón de bienvenida.</p></div><a href="'+REF+'" target="_blank" rel="nofollow noopener">Crear cuenta</a></div>';
 h+='<div class="sec-h"><h2>Explora</h2><span>por tipo</span></div><div class="tiles">'+FAM.map(f=>tile('#/f/'+slug(f[0]),f[0],f[1].length,port(f[1]),f[0])).join('')+'</div>';
 if(dest.length) h+='<div class="sec-h"><h2>Mejor batch</h2><span>★ top del mercado</span></div><div class="grid">'+dest.map(card).join('')+'</div>';
 h+='<div class="sec-h"><h2>Marcas</h2><span>toca para entrar</span></div><div class="tiles">'+BR.slice(0,28).map(b=>tile('#/m/'+slug(b[0]),b[0],b[1].length,port(b[1]),b[0])).join('')+'</div>';
 h+='<div class="sec-h"><h2>Categorías</h2><span>por prenda</span></div><div class="tiles">'+CT.map(c=>tile('#/c/'+slug(c[0]),c[0],c[1].length,port(c[1]),c[0])).join('')+'</div>';
 h+=guia;
 main().innerHTML=h;
 lazy();
}
</script><script>
const cuenta=(arr,k)=>{const m={};arr.forEach(i=>{if(i[k]&&i[k]!=='Otros')m[i[k]]=(m[i[k]]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);};
function ruta(){
 const h=(location.hash||'#/').slice(2);
 window.scrollTo(0,0);
 document.getElementById('side').classList.remove('open');
 if(!h){ home(); return; }
 if(h==='todo'){ sidebar('todo'); pintarLista('Todo el catálogo', ITEMS, cuenta(ITEMS,'c')); return; }
 if(h==='guia'){ sidebar('guia'); main().innerHTML=guia; return; }
 const p=h.split('/'); const tipo=p[0], val=p[1];
 if(tipo==='m'){ const e=BR.find(x=>slug(x[0])===val); if(e){ sidebar('m:'+e[0]); pintarLista(e[0], e[1], cuenta(e[1],'c')); return; } }
 if(tipo==='c'){ const e=CT.find(x=>slug(x[0])===val); if(e){ sidebar('c:'+e[0]); pintarLista(e[0], e[1], cuenta(e[1],'b')); return; } }
 if(tipo==='f'){ const e=FAM.find(x=>slug(x[0])===val); if(e){ sidebar('f:'+e[0]); pintarLista(e[0], e[1], cuenta(e[1],'c')); return; } }
 if(tipo==='q'){ const t=decodeURIComponent(val||'').toLowerCase();
   const r=ITEMS.filter(i=>(i.n+' '+i.b).toLowerCase().indexOf(t)>=0);
   sidebar(''); pintarLista('Búsqueda: '+t, r, cuenta(r,'c')); return; }
 home();
}
let tq;
document.getElementById('q').addEventListener('input',e=>{
 clearTimeout(tq);
 const v=e.target.value.trim();
 tq=setTimeout(()=>{ if(v.length>=2) location.hash='#/q/'+encodeURIComponent(v); else if(location.hash.indexOf('#/q/')===0) location.hash='#/'; },350);
});
document.getElementById('mbtn').onclick=()=>document.getElementById('side').classList.toggle('open');
document.getElementById('side').addEventListener('click',e=>{if(e.target.closest('.slink'))document.getElementById('side').classList.remove('open');});
window.addEventListener('hashchange',ruta);
window.addEventListener('scroll',()=>{
 const b=document.getElementById('more');
 if(b && b.style.display!=='none' && b.getBoundingClientRect().top < window.innerHeight+400) render(false);
});
cargar().then(ruta).catch(()=>{ main().innerHTML='<div class="hero"><h1>Error al cargar</h1><p>Recarga la página.</p></div>'; });
</script>
